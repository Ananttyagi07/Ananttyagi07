name: Daily Commit

on:
  schedule:
    - cron: "0 0 * * *"

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - run: echo "$(date)" >> activity.log
      - run: |
          git config --global user.name github-actions
          git config --global user.email actions@github.com
          git add .
          git commit -m "auto update"
          git push
